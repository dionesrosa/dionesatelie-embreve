<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --pink:oklch(0.66 0.27 0);
    --pink-soft:oklch(0.55 0.25 350);
    --silver:oklch(0.85 0.01 280);
    --bg:oklch(0.06 0.01 350);
    --fg:oklch(0.98 0.005 350);
  }
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  main{
    position:relative;height:100vh;width:100%;overflow:hidden;
    background:radial-gradient(ellipse at top, oklch(0.13 0.04 350) 0%, oklch(0.06 0.01 350) 60%, oklch(0.04 0 0) 100%);
  }
  .layer{position:absolute;inset:0;pointer-events:none}
  .bg-img{background:url('assets/fundo-cristais.png') center/cover no-repeat;opacity:.55;mix-blend-mode:screen}
  .bg-dark{background:linear-gradient(180deg, oklch(0.06 0.02 350 / 0.55) 0%, oklch(0.05 0.01 350 / 0.7) 100%)}
  .bg-vignette{background:radial-gradient(ellipse at center, transparent 30%, oklch(0.04 0 0 / 0.7) 75%, oklch(0.02 0 0 / 0.95) 100%)}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);animation:glowPulse 4s ease-in-out infinite}
  .blob-1{top:-160px;left:-160px;width:500px;height:500px;background:radial-gradient(circle, oklch(0.66 0.27 0 / 0.35), transparent 70%)}
  .blob-2{bottom:-160px;right:-160px;width:600px;height:600px;background:radial-gradient(circle, oklch(0.55 0.25 350 / 0.3), transparent 70%);filter:blur(100px);animation-delay:2s}
  #cursor{position:fixed;inset:0;z-index:1;transition:background .25s linear;background:radial-gradient(600px circle at 50% 50%, oklch(0.66 0.27 0 / 0.18), transparent 60%)}
  .grain{opacity:.04;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

  .crystal{position:absolute;pointer-events:none;color:#fff}
  .crystal svg{width:100%;height:100%;display:block;fill:currentColor}
  .float{animation:floatSlow 8s ease-in-out infinite}
  .spark{animation:sparkle 3s ease-in-out infinite}

  .content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;padding:18px 16px;text-align:center}
  @media(min-width:640px){.content{padding:28px 24px}}

  .topmark{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.6);animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:.1s}
  .topmark .line{width:32px;height:1px;background:rgba(255,255,255,.3)}
  .topmark .star{width:12px;height:12px;color:var(--pink)}

  .hero{display:flex;flex-direction:column;align-items:center;max-width:56rem}
  .embreve{font-size:11px;letter-spacing:.6em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:14px;animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:.3s}
  @media(min-width:640px){.embreve{font-size:12px;margin-bottom:16px}}
  .logo{width:100%;max-width:240px;height:auto;animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:.5s;filter:drop-shadow(0 0 40px oklch(0.66 0.27 0 / .45))}
  @media(min-width:640px){.logo{max-width:380px}}
  @media(min-width:768px){.logo{max-width:480px}}
  @media(min-width:1024px){.logo{max-width:540px}}
  .tagrow{display:flex;align-items:center;gap:12px;margin-top:18px;animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:.8s}
  .tagrow .grad{height:1px;width:36px;background:linear-gradient(90deg,transparent,var(--pink),transparent)}
  @media(min-width:640px){.tagrow{margin-top:24px}.tagrow .grad{width:56px}}
  .tagrow .tag{font-size:10px;letter-spacing:.5em;text-transform:uppercase;color:var(--pink)}
  @media(min-width:640px){.tagrow .tag{font-size:12px}}
  .quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:18px;line-height:1.3;color:rgba(255,255,255,.85);max-width:36rem;margin-top:20px;padding:0 8px;animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:1s}
  @media(min-width:640px){.quote{font-size:22px;margin-top:28px}}
  @media(min-width:768px){.quote{font-size:26px}}

  .buttons{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:24px;animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:1.4s}
  @media(min-width:640px){.buttons{flex-direction:row;gap:16px;margin-top:32px}}
  .btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:10px;border-radius:9999px;padding:12px 24px;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#fff;transition:transform .5s ease;cursor:pointer}
  @media(min-width:640px){.btn{padding:14px 32px;font-size:12px}}
  .btn:hover{transform:scale(1.03)}
  .btn svg{width:16px;height:16px}
  .btn .shine{position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);transition:transform 1s ease}
  .btn:hover .shine{transform:translateX(100%)}
  .btn-glass{background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 0 40px oklch(0.66 0.27 0 / .2)}
  .btn-pink{background:linear-gradient(135deg,var(--pink),var(--pink-soft));box-shadow:0 10px 40px oklch(0.66 0.27 0 / .45)}

  footer{display:flex;flex-direction:column;align-items:center;gap:6px;animation:reveal 1.2s cubic-bezier(.22,1,.36,1) both;animation-delay:1.6s}
  .loc{display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  .loc .dot{width:4px;height:4px;border-radius:50%;background:var(--pink)}

  @keyframes reveal{from{opacity:0;transform:translateY(40px);filter:blur(10px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
  @keyframes floatSlow{0%,100%{transform:translateY(0) translateX(0);opacity:.4}50%{transform:translateY(-30px) translateX(10px);opacity:1}}
  @keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
  @keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
</style>
</head>
<body>
<main>
  <div class="layer bg-img"></div>
  <div class="layer bg-dark"></div>
  <div class="layer bg-vignette"></div>
  <div id="cursor"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div id="crystals"></div>
  <div class="layer grain"></div>

  <div class="content">
    <div class="topmark">
      <span class="line"></span>
      <span>Em breve</span>
      <span class="line"></span>
    </div>

    <section class="hero">
      <img class="logo" src="assets/logo-diones.png" alt="Diones Ateliê" />
      <div class="tagrow">
        <span class="grad"></span>
        <span class="tag">Vestidos · Customizações · Carnaval</span>
        <span class="grad"></span>
      </div>
      <p class="quote">Um universo de detalhes, personalidade e peças exclusivas está chegando.</p>

      <div class="buttons">
        <a class="btn btn-glass" href="https://instagram.com/dionesatelie" target="_blank" rel="noopener">
          <span class="shine"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          Instagram
        </a>
        <a class="btn btn-glass" href="https://wa.me/5555996724397" target="_blank" rel="noopener">
          <span class="shine"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          WhatsApp
        </a>
      </div>
    </section>

    <footer>
      <div class="loc">
        <span class="dot"></span>
        Tupanciretã · RS
        <span class="dot"></span>
      </div>
    </footer>
  </div>
</main>

<script>
  // Cursor glow
  const cursor=document.getElementById('cursor');
  window.addEventListener('mousemove',e=>{
    const x=(e.clientX/window.innerWidth)*100, y=(e.clientY/window.innerHeight)*100;
    cursor.style.background=`radial-gradient(600px circle at ${x}% ${y}%, oklch(0.66 0.27 0 / 0.18), transparent 60%)`;
  });
  // Crystals
  const wrap=document.getElementById('crystals');
  const star='<svg viewBox="0 0 24 24"><path d="M12 0 L13.5 10.5 L24 12 L13.5 13.5 L12 24 L10.5 13.5 L0 12 L10.5 10.5 Z"/></svg>';
  function add(n,cls,sizeFn,delayMax,durFn,filterFn){
    for(let i=0;i<n;i++){
      const el=document.createElement('div');
      el.className='crystal '+cls;
      const s=sizeFn();
      el.style.width=s+'px';el.style.height=s+'px';
      el.style.top=(Math.random()*100)+'%';
      el.style.left=(Math.random()*100)+'%';
      el.style.animationDelay=(Math.random()*delayMax)+'s';
      if(durFn)el.style.animationDuration=durFn()+'s';
      el.style.filter=filterFn(s);
      el.innerHTML=star;
      wrap.appendChild(el);
    }
  }
  add(18,'float',()=>10,8,null,()=>'drop-shadow(0 0 6px oklch(0.85 0.01 280 / .9)) drop-shadow(0 0 12px oklch(0.66 0.27 0 / .5))');
  add(40,'spark',()=>Math.random()*8+4,5,()=>Math.random()*4+3,(s)=>`drop-shadow(0 0 ${s*0.6}px oklch(0.66 0.27 0 / .9)) drop-shadow(0 0 ${s*0.3}px white)`);
</script>
</body>
</html>
